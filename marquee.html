<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Marquee Design</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            background: linear-gradient(90deg, #ff6b6b, #6b6bff);
            padding: 10px;
            border-radius: 10px;
        }

        .marquee-text {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            animation: marquee 10s linear infinite;
        }

        @keyframes marquee {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text">🔥 Welcome to My Cool Marquee Design! 🚀</div>
    </div>

</body>
</html>
